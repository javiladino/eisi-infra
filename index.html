<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingenierie 2 EISI ALT 25/26 - INFRA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div class="cyber-container">
        <div class="header-top">
            <h1 class="glitch" data-text="MSI_SYSTEM_2026">Ingenierie 2 EISI ALT 25/26 - INFRA</h1>
            <button id="lang-btn" class="lang-btn">ESP / FRA</button>
        </div>

        <header>
            <div class="stats-bar">
                <div class="stat-card">
                    <span class="label lang-text" data-key="labelCal">SEMANAS CALENDARIO:</span>
                    <span id="weeks-calendar" class="value neon-text-blue">--</span>
                </div>
                <div class="stat-card highlight">
                    <span class="label lang-text" data-key="labelTrain">SEMANAS FORMACIÓN:</span>
                    <span id="weeks-training" class="value neon-text-yellow">--</span>
                </div>
                <div id="current-date" class="stat-card">
                    <span class="label lang-text" data-key="labelGoTo">IR A SEMANA DE:</span>
                    <select id="week-selector" class="cyber-select"></select>
                </div>
            </div>
        </header>

        <main>
            <section class="board">
                <h2 class="section-title"> > <span class="lang-text" data-key="titleCurrent">SEMANA SELECCIONADA</span></h2>
                <div id="current-week-list" class="grid-container"></div>
            </section>

            <section class="board next-week-section">
                <h2 class="section-title"> > <span class="lang-text" data-key="titleNext">PRÓXIMA SEMANA DE ACTIVIDAD</span></h2>
                <div id="next-week-list" class="grid-container"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
